<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivetrain Calc</title>
    <style>
        :root {
            --primary: #ffffff;
            --bg: #000000;
            --card: #141414;
            --text: #e5e5e5;
            --text-muted: #737373;
            --border: #262626;
            --track-bg: #404040;
            --accent: #d4d4d4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Mono", "Segoe UI Mono", "Roboto Mono", "Oxygen Mono", "Ubuntu Mono", "Courier New", Courier, monospace;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 8px;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        .container {
            background: var(--card);
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            max-width: 380px;

            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header-row {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .reset-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text);
            opacity: 0.5;
            pointer-events: none;
            padding: 4px;
            margin-left: 8px;
            display: flex;
            align-items: center;
        }

        .reset-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .reset-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .label-row span:last-child {
            color: var(--text);
            font-family: inherit;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
            height: 24px;
            touch-action: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: var(--track-bg);
            border-radius: 8px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--primary);
            margin-top: -8px;
            border: none;
            box-shadow: none;
        }

        input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.1);
        }

        input[type="range"]::-moz-range-track {
            width: 100%;
            height: 4px;
            background: var(--track-bg);
            border-radius: 8px;
        }

        input[type="range"]::-moz-range-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: none;
            box-shadow: none;
        }

        .results {
            background-color: var(--bg);
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            color: var(--text-muted);
            gap: 24px;
        }

        .animations-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding: 10px 0;
        }

        .animation-container {
            position: relative;
            height: 160px;
            width: 160px;
            background-color: var(--bg);
            overflow: hidden;
            cursor: pointer;
            border-radius: 8px;
        }

        .crank-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10%;
            height: 10%;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .crank-arm {
            position: absolute;
            top: 50%;
            left: 50%;
            width : 50%;
            height: 10%;
            background-color: var(--accent);
            transform-origin: left center;
            transform: translate(-50%, -50%);
            border-radius: 0 20px 20px 0;
        }

        .bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .bar {
            width: 24px;
            background-color: var(--accent);
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            position: absolute;
        }

        .bar-top {
            top: 0;
            left: 32px;
        }

        .bar-right {
            top: 0;
            right: 32px;
        }

        .wheel-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .wheel-option {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .wheel-option.active {
            background: var(--primary);
            color: var(--bg);
            border-color: var(--primary);
        }

        .anim-label {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 8px;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="header-row">
        <h1>Drivetrain Calc</h1>
        <button class="reset-btn" id="reset-btn" aria-label="Reset">
            <svg viewBox="0 0 24 24">
                <path d="M23 4v6h-6"></path>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
        </button>
    </div>

    <div class="input-group">
        <div class="label-row">
            <span>Chainring</span>
            <span id="val-front">53</span>
        </div>
        <input type="range" id="front" min="28" max="60" value="53">
    </div>

    <div class="input-group">
        <div class="label-row">
            <span>Cog</span>
            <span id="val-rear">17</span>
        </div>
        <input type="range" id="rear" min="10" max="42" value="17">
    </div>

    <div class="input-group">
        <div class="label-row">
            <span>Cadence</span>
            <span id="val-cadence">90</span>
        </div>
        <input type="range" id="cadence" min="20" max="200" value="90">
    </div>

    <div class="input-group">
        <div class="label-row">
            <span>Crank Length</span>
            <span id="val-arm">165</span>
        </div>
        <input type="range" id="arm" min="150" max="200" value="165" step="2.5">
    </div>

    <div class="input-group">
        <div class="label-row">
            <span>Wheel Size</span>
            <div class="wheel-selector">
                <button class="wheel-option" data-size="650c">650c</button>
                <button class="wheel-option active" data-size="700c">700c</button>
            </div>
        </div>
        <div class="label-row" style="margin-top: 8px;">
            <span>Tire Width</span>
            <span id="val-width">28</span>
        </div>
        <input type="range" id="width" min="20" max="50" value="25">
        <div class="label-row" style="margin-top: 4px; font-size: 0.8rem; color: var(--text-muted);">
            <span>Wheel Circumference:</span>
            <span id="val-wheel">2130</span>
        </div>
    </div>

    <div class="results">
        <div class="result-item">
            <span>Speed:</span>
            <span id="res-speed">0.00 km/h</span>
        </div>
        <div class="result-item">
            <span>Pedal Velocity:</span>
            <span id="res-pedal">0.00 km/h</span>
        </div>
        <div class="result-item">
            <span>Gear Ratio:</span>
            <span id="res-ratio">0.00</span>
        </div>
    </div>

    <div class="animations-wrapper" id="anim-wrapper">
        <div style="display:flex; flex-direction:column; align-items:center;">
            <div class="animation-container" id="anim-bars">
                <div class="bar-container">
                    <div class="bar bar-top" id="bar-top"></div>
                    <div class="bar bar-right" id="bar-right"></div>
                </div>
            </div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center;">
            <div class="animation-container" id="anim-rot">
                <div class="crank-center"></div>
                <div class="crank-arm" id="anim-arm"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const inputs = {
        front: document.getElementById('front'),
        rear: document.getElementById('rear'),
        cadence: document.getElementById('cadence'),
        arm: document.getElementById('arm'),
        width: document.getElementById('width')
    };

    const displays = {
        front: document.getElementById('val-front'),
        rear: document.getElementById('val-rear'),
        cadence: document.getElementById('val-cadence'),
        arm: document.getElementById('val-arm'),
        width: document.getElementById('val-width'),
        wheel: document.getElementById('val-wheel'),
        speed: document.getElementById('res-speed'),
        pedal: document.getElementById('res-pedal'),
        ratio: document.getElementById('res-ratio')
    };

    const animArm = document.getElementById('anim-arm');
    const barTop = document.getElementById('bar-top');
    const barRight = document.getElementById('bar-right');
    const animWrapper = document.getElementById('anim-wrapper');
    const resetBtn = document.getElementById('reset-btn');
    const wheelButtons = document.querySelectorAll('.wheel-option');

    let selectedWheelSize = '700c';
    const defaultValues = { front: 53, rear: 17, cadence: 90, arm: 165, width: 25, wheelSize: '700c' };
    let lastTime = performance.now();
    let currentAngle = 0;
    let currentAngularSpeed = 0;
    let isPaused = false;
    let lastArmVal = 165;

    const cache = {
        front: null,
        rear: null,
        cadence: null,
        arm: null,
        width: null,
        wheelSize: null,
        wheelCirc: null
    };

    function getWheelCircumference() {
        const beadDiameter = selectedWheelSize === '650c' ? 584 : 622;
        const tireWidth = parseInt(inputs.width.value);
        return Math.round((beadDiameter + (tireWidth * 2)) * Math.PI);
    }

    function checkResetState() {
        const isDefault =
            parseInt(inputs.front.value) === defaultValues.front &&
            parseInt(inputs.rear.value) === defaultValues.rear &&
            parseInt(inputs.cadence.value) === defaultValues.cadence &&
            parseFloat(inputs.arm.value) === defaultValues.arm &&
            parseInt(inputs.width.value) === defaultValues.width &&
            selectedWheelSize === defaultValues.wheelSize;
        resetBtn.classList.toggle('active', !isDefault);
    }

    function calculate() {
        const front = parseInt(inputs.front.value);
        const rear = parseInt(inputs.rear.value);
        const cadence = parseInt(inputs.cadence.value);
        const arm = parseFloat(inputs.arm.value);
        const width = parseInt(inputs.width.value);

        if (
            front === cache.front &&
            rear === cache.rear &&
            cadence === cache.cadence &&
            arm === cache.arm &&
            width === cache.width &&
            selectedWheelSize === cache.wheelSize
        ) {
            return;
        }

        cache.front = front;
        cache.rear = rear;
        cache.cadence = cadence;
        cache.arm = arm;
        cache.width = width;
        cache.wheelSize = selectedWheelSize;

        displays.front.textContent = front;
        displays.rear.textContent = rear;
        displays.cadence.textContent = cadence;
        displays.arm.textContent = arm;
        displays.width.textContent = width;

        const wheel = getWheelCircumference();
        cache.wheelCirc = wheel;
        displays.wheel.textContent = wheel;

        const gearRatio = front / rear;
        const speedKph = (cadence * gearRatio * wheel * 60) / 1000000;
        currentAngularSpeed = (cadence * 2 * Math.PI) / 60;
        const pedalSpeedKph = (currentAngularSpeed * arm / 1000) * 3.6;

        displays.speed.textContent = speedKph.toFixed(2) + " km/h";
        displays.pedal.textContent = pedalSpeedKph.toFixed(2) + " km/h";
        displays.ratio.textContent = gearRatio.toFixed(2);
        checkResetState();
    }

    function animate(time) {
        if (!isPaused) {
            const deltaTime = (time - lastTime) / 1000;
            lastTime = time;
            currentAngle += currentAngularSpeed * deltaTime;
        } else {
            lastTime = time;
            const currentArmVal = parseFloat(inputs.arm.value);
            if (currentArmVal === lastArmVal) return requestAnimationFrame(animate);
            lastArmVal = currentArmVal;
        }

        // Rotation Logic
        const deg = currentAngle * (180 / Math.PI);
        const normDeg = ((deg % 360) + 360) % 360;
        const d4 = Math.min(Math.abs(normDeg - 30), 360 - Math.abs(normDeg - 30));
        const d10 = Math.min(Math.abs(normDeg - 200), 360 - Math.abs(normDeg - 200));
        const brightness = 0.2 + Math.max(0, 1 - (d4 / 90)) * 1.0 + Math.max(0, 1 - (d10 / 120)) * 0.5;

        const currentArmVal = parseFloat(inputs.arm.value);
        const armWidthPercent = (currentArmVal / 200) * 50;

        animArm.style.width = armWidthPercent + '%';
        animArm.style.transform = `translate(0, -50%) rotate(${deg}deg)`;

        // Bar Logic
        const hFactor = (Math.sin(currentAngle) + 1) / 2;
        const frameCenter = 80;
        const armPx = (currentArmVal / 200) * 75;
        const minH = Math.max(4, frameCenter - armPx);
        const maxH = Math.min(156, frameCenter + armPx);
        const hRight = minH + (maxH - minH) * hFactor;
        barRight.style.height = hRight + 'px';
        barRight.style.opacity = 0.6 + (hFactor * 0.4);
        barTop.style.height = (maxH + minH - hRight) + 'px';
        barTop.style.opacity = 0.6 + ((1 - hFactor) * 0.4);

        requestAnimationFrame(animate);
    }

    function updateWheelSelector() {
        wheelButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.size === selectedWheelSize));
    }

    function resetSliders() {
        inputs.front.value = defaultValues.front;
        inputs.rear.value = defaultValues.rear;
        inputs.cadence.value = defaultValues.cadence;
        inputs.arm.value = defaultValues.arm;
        inputs.width.value = defaultValues.width;
        selectedWheelSize = defaultValues.wheelSize;
        updateWheelSelector();
        calculate();
    }

    wheelButtons.forEach(btn => btn.addEventListener('click', () => {
        selectedWheelSize = btn.dataset.size;
        updateWheelSelector();
        calculate();
    }));

    animWrapper.addEventListener('click', () => {
        isPaused = !isPaused;
        if (!isPaused) lastTime = performance.now();
    });

    Object.values(inputs).forEach(input => input.addEventListener('input', calculate));
    resetBtn.addEventListener('click', resetSliders);

    calculate();
    requestAnimationFrame(animate);
</script>
</body>
</html>
